<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亚马逊棋 - Amazons Engine GUI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg-primary: #0f1923;
    --bg-secondary: #1a2634;
    --bg-card: #1e2d3d;
    --accent: #57d5b4;
    --accent-strong: #69b7ff;
    --accent-glow: rgba(87, 213, 180, 0.28);
    --text-primary: #e8edf2;
    --text-secondary: #8ea0b5;
    --cell-light: #33485d;
    --cell-dark: #223545;
    --white-piece: #f6d365;
    --black-piece: #ff8373;
    --arrow-color: #7a8ca1;
    --highlight: rgba(87, 213, 180, 0.35);
    --move-target: rgba(105, 183, 255, 0.25);
    --arrow-target: rgba(255, 131, 115, 0.26);
    --danger: #ff8373;
    --success: #57d5b4;
}

body {
    font-family: 'Noto Sans SC', sans-serif;
    background:
        radial-gradient(circle at top left, rgba(87, 213, 180, 0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(105, 183, 255, 0.08), transparent 26%),
        var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
}

header {
    width: 100%;
    padding: 18px 28px;
    background: linear-gradient(135deg, rgba(26, 38, 52, 0.96), rgba(30, 45, 61, 0.96));
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

header h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 0.85rem;
}

.main-container {
    display: flex;
    gap: 28px;
    padding: 28px;
    max-width: 1380px;
    margin: 0 auto;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
}

.board-wrapper {
    position: relative;
}

.board-container {
    display: grid;
    grid-template-columns: 28px repeat(10, 1fr);
    grid-template-rows: repeat(10, 1fr) 28px;
    width: min(68vw, 620px);
    height: min(68vw, 620px);
    min-width: 360px;
    min-height: 360px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38), 0 0 60px rgba(87, 213, 180, 0.04);
}

.rank-label, .file-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 0.74rem;
    font-weight: 600;
}

.cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.12s ease, filter 0.12s ease, background 0.12s ease;
}

.cell.light { background: var(--cell-light); }
.cell.dark { background: var(--cell-dark); }
.cell:hover { filter: brightness(1.08); }
.cell.selected {
    background: var(--highlight) !important;
    box-shadow: inset 0 0 18px var(--accent-glow);
}
.cell.move-target { background: var(--move-target) !important; }
.cell.arrow-target { background: var(--arrow-target) !important; }
.cell.move-target::after,
.cell.arrow-target::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
}
.cell.move-target::after { background: rgba(105, 183, 255, 0.72); }
.cell.arrow-target::after { background: rgba(255, 131, 115, 0.72); }

.piece-white,
.piece-black,
.piece-arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: clamp(1.5rem, 3vw, 2rem);
}

.piece-white {
    color: var(--white-piece);
    text-shadow: 0 0 12px rgba(246, 211, 101, 0.4);
}

.piece-black {
    color: var(--black-piece);
    text-shadow: 0 0 12px rgba(255, 131, 115, 0.35);
}

.piece-arrow {
    color: var(--arrow-color);
    font-size: clamp(1rem, 2.2vw, 1.35rem);
}

.side-panel {
    width: 360px;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.panel-card {
    background: rgba(30, 45, 61, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
}

.panel-card h3 {
    color: var(--accent);
    font-size: 0.92rem;
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
}

#status-text {
    font-size: 1.02rem;
    font-weight: 700;
}

#phase-hint {
    margin-top: 8px;
    line-height: 1.6;
    color: var(--text-secondary);
    font-size: 0.84rem;
}

#engine-meta {
    margin-top: 10px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    line-height: 1.5;
}

#engine-mode {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(15, 25, 35, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 0.78rem;
    color: var(--text-secondary);
}

#engine-mode strong {
    color: var(--text-primary);
}

.btn {
    width: 100%;
    padding: 11px 16px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.16s ease, filter 0.16s ease, background 0.16s ease;
    margin-bottom: 8px;
}

.btn:hover { transform: translateY(-1px); }
.btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: var(--bg-primary);
}

.btn-secondary {
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.btn-ghost {
    background: transparent;
    color: var(--accent-strong);
    border: 1px solid rgba(105, 183, 255, 0.28);
}

.slider-group {
    margin: 12px 0;
}

.slider-group label,
.check-row,
.option-label {
    color: var(--text-secondary);
    font-size: 0.84rem;
}

.slider-group input[type="range"] {
    width: 100%;
    margin-top: 8px;
    accent-color: var(--accent);
}

#think-time-value {
    color: var(--accent);
    font-weight: 700;
}

.check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
}

.engine-info {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
}

.info-item {
    background: var(--bg-secondary);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
}

.info-item .label {
    font-size: 0.72rem;
    color: var(--text-secondary);
}

.info-item .value {
    margin-top: 4px;
    font-size: 1rem;
    font-weight: 700;
}

#move-list {
    max-height: 220px;
    overflow-y: auto;
    line-height: 1.9;
    font-size: 0.82rem;
    font-family: Consolas, monospace;
    color: var(--text-secondary);
}

.move-entry { display: inline-block; margin-right: 10px; }
.move-entry.white { color: var(--white-piece); }
.move-entry.black { color: var(--black-piece); }

.option-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.option-row {
    background: var(--bg-secondary);
    border-radius: 10px;
    padding: 10px;
    border: 1px solid rgba(255, 255, 255, 0.04);
}

.option-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
}

.option-name {
    font-size: 0.88rem;
    font-weight: 700;
}

.option-type {
    font-size: 0.74rem;
    color: var(--text-secondary);
}

.option-controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

.option-controls input {
    flex: 1;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(15, 25, 35, 0.85);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
}

.option-controls input:focus {
    outline: none;
    border-color: rgba(105, 183, 255, 0.55);
}

.option-controls button {
    min-width: 74px;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    background: linear-gradient(135deg, rgba(87, 213, 180, 0.88), rgba(105, 183, 255, 0.88));
    color: var(--bg-primary);
    font-weight: 700;
    cursor: pointer;
}

.option-desc {
    margin-top: 6px;
    color: var(--text-secondary);
    font-size: 0.74rem;
}

.empty-text {
    color: var(--text-secondary);
    font-size: 0.82rem;
    line-height: 1.6;
}

.status-ok { color: var(--success); }
.status-error { color: var(--danger); }

@keyframes pulse-glow {
    0%, 100% { box-shadow: inset 0 0 10px var(--accent-glow); }
    50% { box-shadow: inset 0 0 22px rgba(105, 183, 255, 0.22); }
}

.cell.thinking {
    animation: pulse-glow 1.1s ease-in-out infinite;
}

@media (max-width: 980px) {
    header {
        flex-direction: column;
        align-items: flex-start;
    }

    .main-container {
        padding: 18px;
    }

    .board-container {
        width: min(92vw, 560px);
        height: min(92vw, 560px);
        min-width: 300px;
        min-height: 300px;
    }

    .side-panel {
        width: min(92vw, 560px);
    }
}
</style>
</head>
<body>
<header>
    <div>
        <h1>亚马逊棋</h1>
        <div class="subtitle">Amazons Engine GUI · 动态 UCI 配置面板</div>
    </div>
    <div class="subtitle" id="engine-version">正在读取引擎信息...</div>
</header>

<div class="main-container">
    <div class="board-wrapper">
        <div class="board-container" id="board"></div>
    </div>

    <div class="side-panel">
        <div class="panel-card">
            <h3>游戏状态</h3>
            <div id="status-text">白方走棋</div>
            <div id="phase-hint">点击一个白色皇后开始走棋。</div>
            <div id="engine-mode">评估模式：<strong>读取中...</strong></div>
            <div id="engine-meta">尚未读取到引擎元数据。</div>
        </div>

        <div class="panel-card">
            <h3>对局控制</h3>
            <button class="btn btn-primary" id="btn-new" onclick="newGame()">新对局</button>
            <button class="btn btn-secondary" id="btn-undo" onclick="undoMove()" disabled>悔棋</button>

            <div class="slider-group">
                <label>引擎思考时间：<span id="think-time-value">2.0 秒</span></label>
                <input type="range" id="think-time" min="500" max="10000" step="500" value="2000">
            </div>

            <label class="check-row">
                <input type="checkbox" id="auto-play" style="accent-color: var(--accent);">
                引擎自动应答（人机对弈）
            </label>
        </div>

        <div class="panel-card">
            <h3>UCI 选项</h3>
            <button class="btn btn-ghost" onclick="loadEngineOptions()">刷新选项</button>
            <div class="option-list" id="uci-options">
                <div class="empty-text">正在加载引擎声明的 UCI 选项...</div>
            </div>
        </div>

        <div class="panel-card">
            <h3>引擎分析</h3>
            <div class="engine-info">
                <div class="info-item"><div class="label">深度</div><div class="value" id="info-depth">-</div></div>
                <div class="info-item"><div class="label">评分</div><div class="value" id="info-score">-</div></div>
                <div class="info-item"><div class="label">节点</div><div class="value" id="info-nodes">-</div></div>
                <div class="info-item"><div class="label">步数</div><div class="value" id="info-moves">0</div></div>
            </div>
        </div>

        <div class="panel-card">
            <h3>走法记录</h3>
            <div id="move-list"></div>
        </div>
    </div>
</div>

<script>
const EMPTY = 0;
const WHITE_AMAZON = 1;
const BLACK_AMAZON = 2;
const ARROW = 3;
const COLS = 'abcdefghij';
const DR = [1, -1, 0, 0, 1, -1, 1, -1];
const DC = [0, 0, 1, -1, 1, -1, -1, 1];

let board = new Array(100).fill(EMPTY);
let sideToMove = 0;
let moveHistory = [];
let gameOver = false;
let phase = 0;
let selectedFrom = -1;
let selectedTo = -1;
let legalMoveTargets = [];
let legalArrowTargets = [];
let uciOptions = [];
let engineState = null;

const thinkTimeSlider = document.getElementById('think-time');
const thinkTimeValue = document.getElementById('think-time-value');
thinkTimeSlider.addEventListener('input', () => {
    thinkTimeValue.textContent = (thinkTimeSlider.value / 1000).toFixed(1) + ' 秒';
});

function sqRow(sq) { return Math.floor(sq / 10); }
function sqCol(sq) { return sq % 10; }
function makeSq(r, c) { return r * 10 + c; }
function sqToStr(sq) { return COLS[sqCol(sq)] + (sqRow(sq) + 1); }
function strToSq(s) {
    const col = s.charCodeAt(0) - 97;
    const row = parseInt(s.slice(1), 10) - 1;
    return makeSq(row, col);
}

function initBoard() {
    board.fill(EMPTY);
    board[30] = WHITE_AMAZON;
    board[3] = WHITE_AMAZON;
    board[6] = WHITE_AMAZON;
    board[39] = WHITE_AMAZON;
    board[60] = BLACK_AMAZON;
    board[93] = BLACK_AMAZON;
    board[96] = BLACK_AMAZON;
    board[69] = BLACK_AMAZON;

    sideToMove = 0;
    moveHistory = [];
    phase = 0;
    selectedFrom = -1;
    selectedTo = -1;
    legalMoveTargets = [];
    legalArrowTargets = [];
    gameOver = false;
}

function getQueenSlides(sq, boardState) {
    const targets = [];
    for (let d = 0; d < 8; d += 1) {
        let r = sqRow(sq);
        let c = sqCol(sq);
        while (true) {
            r += DR[d];
            c += DC[d];
            if (r < 0 || r >= 10 || c < 0 || c >= 10) break;
            const s = makeSq(r, c);
            if (boardState[s] !== EMPTY) break;
            targets.push(s);
        }
    }
    return targets;
}

function isLegalLocalMove(from, to, arrow) {
    if (from < 0 || to < 0 || arrow < 0) return false;
    const expected = sideToMove === 0 ? WHITE_AMAZON : BLACK_AMAZON;
    if (board[from] !== expected || board[to] !== EMPTY) return false;

    const moveTargets = getQueenSlides(from, board);
    if (!moveTargets.includes(to)) return false;

    const tempBoard = [...board];
    tempBoard[from] = EMPTY;
    tempBoard[to] = expected;
    if (tempBoard[arrow] !== EMPTY) return false;

    return getQueenSlides(to, tempBoard).includes(arrow);
}

function renderBoard() {
    const container = document.getElementById('board');
    container.innerHTML = '';

    for (let visualRow = 0; visualRow < 10; visualRow += 1) {
        const rank = 10 - visualRow;
        const boardRow = rank - 1;

        const rankLabel = document.createElement('div');
        rankLabel.className = 'rank-label';
        rankLabel.textContent = rank;
        container.appendChild(rankLabel);

        for (let col = 0; col < 10; col += 1) {
            const sq = makeSq(boardRow, col);
            const cell = document.createElement('div');
            cell.className = 'cell ' + (((boardRow + col) % 2 === 0) ? 'light' : 'dark');
            cell.dataset.sq = sq;

            if (sq === selectedFrom || sq === selectedTo) cell.classList.add('selected');
            if (phase === 1 && legalMoveTargets.includes(sq)) cell.classList.add('move-target');
            if (phase === 2 && legalArrowTargets.includes(sq)) cell.classList.add('arrow-target');

            if (board[sq] === WHITE_AMAZON) {
                cell.innerHTML = '<span class="piece-white">♕</span>';
            } else if (board[sq] === BLACK_AMAZON) {
                cell.innerHTML = '<span class="piece-black">♛</span>';
            } else if (board[sq] === ARROW) {
                cell.innerHTML = '<span class="piece-arrow">✦</span>';
            }

            cell.addEventListener('click', () => onCellClick(sq));
            container.appendChild(cell);
        }
    }

    const corner = document.createElement('div');
    corner.className = 'file-label';
    container.appendChild(corner);
    for (let col = 0; col < 10; col += 1) {
        const fileLabel = document.createElement('div');
        fileLabel.className = 'file-label';
        fileLabel.textContent = COLS[col];
        container.appendChild(fileLabel);
    }
}

function resetSelection() {
    phase = 0;
    selectedFrom = -1;
    selectedTo = -1;
    legalMoveTargets = [];
    legalArrowTargets = [];
}

function hasAnyLegalMove() {
    const expected = sideToMove === 0 ? WHITE_AMAZON : BLACK_AMAZON;
    for (let sq = 0; sq < 100; sq += 1) {
        if (board[sq] !== expected) continue;
        if (getQueenSlides(sq, board).length > 0) return true;
    }
    return false;
}

function onCellClick(sq) {
    if (gameOver) return;

    if (phase === 0) {
        const expected = sideToMove === 0 ? WHITE_AMAZON : BLACK_AMAZON;
        if (board[sq] !== expected) return;

        selectedFrom = sq;
        legalMoveTargets = getQueenSlides(sq, board);
        if (legalMoveTargets.length === 0) return;

        phase = 1;
        updateHint('请选择皇后的目标格。');
        renderBoard();
        return;
    }

    if (phase === 1) {
        if (sq === selectedFrom) {
            resetSelection();
            renderBoard();
            return;
        }

        const expected = sideToMove === 0 ? WHITE_AMAZON : BLACK_AMAZON;
        if (board[sq] === expected) {
            selectedFrom = sq;
            legalMoveTargets = getQueenSlides(sq, board);
            renderBoard();
            return;
        }

        if (!legalMoveTargets.includes(sq)) return;

        selectedTo = sq;
        const tempBoard = [...board];
        tempBoard[selectedFrom] = EMPTY;
        tempBoard[selectedTo] = expected;
        legalArrowTargets = getQueenSlides(selectedTo, tempBoard);
        if (legalArrowTargets.length === 0) {
            resetSelection();
            renderBoard();
            return;
        }

        phase = 2;
        updateHint('请选择箭的落点。');
        renderBoard();
        return;
    }

    if (phase === 2) {
        if (!legalArrowTargets.includes(sq)) return;
        executeMove(selectedFrom, selectedTo, sq);
    }
}

function executeMove(from, to, arrow) {
    const amazonValue = sideToMove === 0 ? WHITE_AMAZON : BLACK_AMAZON;
    board[from] = EMPTY;
    board[to] = amazonValue;
    board[arrow] = ARROW;

    const moveStr = `${sqToStr(from)}-${sqToStr(to)}/${sqToStr(arrow)}`;
    moveHistory.push(moveStr);
    addMoveToList(moveStr, sideToMove);

    sideToMove = 1 - sideToMove;
    resetSelection();

    document.getElementById('info-moves').textContent = moveHistory.length;
    document.getElementById('btn-undo').disabled = moveHistory.length === 0;

    if (!hasAnyLegalMove()) {
        gameOver = true;
        const winner = sideToMove === 0 ? '黑方' : '白方';
        updateStatus(`${winner}获胜`, '当前一方已经没有合法着法。');
        renderBoard();
        return;
    }

    updateStatus(sideToMove === 0 ? '白方走棋' : '黑方走棋', '点击一个皇后开始下一步。');
    renderBoard();

    if (document.getElementById('auto-play').checked && sideToMove === 1 && !gameOver) {
        askEngine();
    }
}

function updateStatus(status, hint = '') {
    const statusNode = document.getElementById('status-text');
    statusNode.textContent = status;
    statusNode.className = status.includes('错误') || status.includes('非法') ? 'status-error' : 'status-ok';
    document.getElementById('phase-hint').textContent = hint;
}

function updateHint(hint) {
    document.getElementById('phase-hint').textContent = hint;
}

function renderEngineMode(state) {
    engineState = state || null;
    const modeNode = document.getElementById('engine-mode');
    if (!state) {
        modeNode.innerHTML = '评估模式：<strong>未知</strong>';
        return;
    }

    const label = state.mode || 'Unknown';
    const suffix = state.nnue_reason ? ` · ${state.nnue_reason}` : '';
    modeNode.innerHTML = `评估模式：<strong>${label}</strong>${suffix}`;
}

function addMoveToList(moveStr, color) {
    const list = document.getElementById('move-list');
    const entry = document.createElement('span');
    entry.className = `move-entry ${color === 0 ? 'white' : 'black'}`;
    const moveNumber = Math.ceil(moveHistory.length / 2);
    entry.textContent = color === 0 ? `${moveNumber}. ${moveStr}` : moveStr;
    list.appendChild(entry);
    list.scrollTop = list.scrollHeight;
}

function formatNodes(nodes) {
    if (!nodes) return '-';
    if (nodes >= 1000000) return (nodes / 1000000).toFixed(1) + 'M';
    if (nodes >= 1000) return (nodes / 1000).toFixed(1) + 'K';
    return String(nodes);
}

async function askEngine() {
    updateStatus('引擎思考中...', '请稍候，正在等待 bestmove。');
    document.querySelectorAll('.cell').forEach((cell) => cell.classList.add('thinking'));

    try {
        const response = await fetch('/api/move', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                moves: moveHistory,
                thinkTime: parseInt(thinkTimeSlider.value, 10),
            }),
        });
        const data = await response.json();
        document.querySelectorAll('.cell').forEach((cell) => cell.classList.remove('thinking'));

        if (!response.ok) {
            updateStatus('引擎返回错误', data.error || '未收到有效 bestmove。');
            return;
        }

        if (!data.bestmove || data.bestmove === '0000') {
            updateStatus('引擎没有合法着法', '对局可能已经结束。');
            return;
        }

        const parts = data.bestmove.match(/^([a-j]\d+)-([a-j]\d+)\/([a-j]\d+)$/);
        if (!parts) {
            updateStatus('引擎返回了无法解析的走法', data.bestmove);
            return;
        }

        const from = strToSq(parts[1]);
        const to = strToSq(parts[2]);
        const arrow = strToSq(parts[3]);
        if (!isLegalLocalMove(from, to, arrow)) {
            updateStatus('引擎返回了本地校验不通过的走法', data.bestmove);
            return;
        }

        document.getElementById('info-depth').textContent = data.depth || '-';
        document.getElementById('info-score').textContent = data.score ?? '-';
        document.getElementById('info-nodes').textContent = formatNodes(data.nodes);

        executeMove(from, to, arrow);
    } catch (error) {
        document.querySelectorAll('.cell').forEach((cell) => cell.classList.remove('thinking'));
        updateStatus('引擎通信错误', '请确认 Flask 服务和引擎进程都在运行。');
    }
}

async function loadEngineOptions() {
    const container = document.getElementById('uci-options');
    container.innerHTML = '<div class="empty-text">正在重新读取引擎的 UCI 选项...</div>';

    try {
        const response = await fetch('/api/engine/options');
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '读取选项失败');

        uciOptions = data.options || [];
        document.getElementById('engine-version').textContent = data.name || 'Unknown Engine';
        document.getElementById('engine-meta').textContent = `${data.name || 'Unknown Engine'} · 作者：${data.author || 'Unknown'}`;
        renderEngineMode(data.state || null);
        renderUciOptions();
    } catch (error) {
        container.innerHTML = '<div class="empty-text">读取 UCI 选项失败，请检查引擎是否能正常启动。</div>';
        document.getElementById('engine-version').textContent = '引擎信息读取失败';
        document.getElementById('engine-meta').textContent = String(error);
        renderEngineMode(null);
    }
}

async function refreshEngineState() {
    try {
        const response = await fetch('/api/engine/state');
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '读取引擎状态失败');
        renderEngineMode(data);
    } catch (_) {
        renderEngineMode(null);
    }
}

function renderUciOptions() {
    const container = document.getElementById('uci-options');
    if (!uciOptions.length) {
        container.innerHTML = '<div class="empty-text">当前引擎没有声明可配置的 UCI 选项。</div>';
        return;
    }

    container.innerHTML = '';
    for (const option of uciOptions) {
        const row = document.createElement('div');
        row.className = 'option-row';

        const head = document.createElement('div');
        head.className = 'option-head';
        head.innerHTML = `
            <div class="option-name">${option.name}</div>
            <div class="option-type">${option.type}</div>
        `;
        row.appendChild(head);

        const desc = document.createElement('div');
        desc.className = 'option-desc';
        if (option.type === 'spin') {
            desc.textContent = `当前值 ${option.current ?? option.default}，默认值 ${option.default}，范围 ${option.min} - ${option.max}`;
        } else if (option.type === 'check') {
            desc.textContent = `当前值 ${option.current ?? option.default}，默认值 ${option.default}`;
        } else if (option.type === 'string') {
            const currentValue = option.current ?? option.default ?? '';
            const defaultValue = option.default ?? '';
            desc.textContent = `当前值 ${currentValue || '(空)'}，默认值 ${defaultValue || '(空)'}`;
        } else {
            desc.textContent = '点击按钮立即执行。';
        }
        row.appendChild(desc);

        const controls = document.createElement('div');
        controls.className = 'option-controls';

        if (option.type === 'spin' || option.type === 'string') {
            const input = document.createElement('input');
            input.type = option.type === 'spin' ? 'number' : 'text';
            input.value = option.current ?? option.default ?? '';
            if (option.type === 'spin') {
                if (option.min !== null) input.min = option.min;
                if (option.max !== null) input.max = option.max;
            }

            const applyButton = document.createElement('button');
            applyButton.textContent = '应用';
            applyButton.onclick = () => applyOption(option.name, option.type, input.value);

            controls.appendChild(input);
            controls.appendChild(applyButton);
        } else if (option.type === 'check') {
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.checked = String(option.current ?? option.default).toLowerCase() === 'true';

            const applyButton = document.createElement('button');
            applyButton.textContent = '应用';
            applyButton.onclick = () => applyOption(option.name, option.type, input.checked ? 'true' : 'false');

            controls.appendChild(input);
            controls.appendChild(applyButton);
        } else if (option.type === 'button') {
            const button = document.createElement('button');
            button.textContent = option.name;
            button.onclick = () => applyOption(option.name, option.type, null);
            controls.appendChild(button);
        }

        row.appendChild(controls);
        container.appendChild(row);
    }
}

async function applyOption(name, type, value) {
    updateHint(`正在应用 UCI 选项：${name}`);
    try {
        const response = await fetch('/api/engine/option', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, type, value }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '设置失败');

        const message = (data.messages && data.messages.length > 0)
            ? data.messages.join(' | ').replaceAll('info string ', '')
            : `已应用选项 ${name}`;
        const option = uciOptions.find((entry) => entry.name === name);
        if (option && type !== 'button') {
            option.current = value;
        }
        updateHint(message);
        renderUciOptions();
        await refreshEngineState();
    } catch (error) {
        updateStatus('UCI 选项设置失败', String(error));
    }
}

async function newGame() {
    try {
        await fetch('/api/newgame', { method: 'POST' });
    } catch (_) {
        // 离线模式下也允许本地重置棋盘。
    }

    initBoard();
    renderBoard();
    updateStatus('白方走棋', '点击一个白色皇后开始走棋。');
    document.getElementById('move-list').innerHTML = '';
    document.getElementById('info-depth').textContent = '-';
    document.getElementById('info-score').textContent = '-';
    document.getElementById('info-nodes').textContent = '-';
    document.getElementById('info-moves').textContent = '0';
    document.getElementById('btn-undo').disabled = true;
}

function undoMove() {
    if (moveHistory.length === 0) return;

    const moves = [...moveHistory];
    moves.pop();
    initBoard();
    document.getElementById('move-list').innerHTML = '';

    for (const move of moves) {
        const parts = move.match(/^([a-j]\d+)-([a-j]\d+)\/([a-j]\d+)$/);
        if (!parts) continue;
        const from = strToSq(parts[1]);
        const to = strToSq(parts[2]);
        const arrow = strToSq(parts[3]);
        const amazonValue = sideToMove === 0 ? WHITE_AMAZON : BLACK_AMAZON;
        board[from] = EMPTY;
        board[to] = amazonValue;
        board[arrow] = ARROW;
        moveHistory.push(move);
        addMoveToList(move, sideToMove);
        sideToMove = 1 - sideToMove;
    }

    document.getElementById('info-moves').textContent = moveHistory.length;
    document.getElementById('btn-undo').disabled = moveHistory.length === 0;
    updateStatus(sideToMove === 0 ? '白方走棋' : '黑方走棋', '点击一个皇后开始下一步。');
    renderBoard();
}

initBoard();
renderBoard();
loadEngineOptions();
</script>
